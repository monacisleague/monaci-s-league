<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' href='style.css'>
    <title>Classifica - Monaci's League</title>
</head>
<body>
    
    <header>
        <div class="nav">
            <div class="brand">
                <img src="logo.png" alt="Logo" class="logo-img">
                <span>MONACI'S LEAGUE</span>
            </div>
            
            <div class="hamburger" id="hamburger-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <nav class="nav-menu" id="nav-links">
                <a href="index.html">Home</a>
                <a href="squadre.html">Squadre</a>
                <a href="risultati.html">Risultati</a>
                <a href="classifica.html">Classifica</a>
                <a href="marcatori.html">Marcatori</a>
            </nav>
        </div>
    </header>

    <div class='container kl-container'>
        <h1 class="kl-main-title">CLASSIFICA</h1>
        
        <table class="kl-table">
            <thead>
                <tr>
                    <th>POS</th>
                    <th>TEAM</th>
                    <th>V</th>
                    <th>S</th>
                    <th>VS</th>
                    <th>SS</th>
                    <th>DIF</th>
                    <th>PT</th>
                </tr>
            </thead>
            <tbody>
                <tr class="pos-semi team-calabroni">
                    <td class="pos-num">1</td>
                    <td class="team-name">
                        <img src="calabroni.png" alt="">
                        <span>CAL</span>
                    </td>
                    <td>8</td>
                    <td>1</td>
                    <td>1</td>
                    <td>0</td>
                    <td>+16</td>
                    <td class="pt-val">28</td>
                </tr>
                <tr class="pos-semi team-grizzly">
                    <td class="pos-num">2</td>
                    <td class="team-name">
                        <img src="grizzly.png" alt="">
                        <span>GRI</span>
                    </td>
                    <td>7</td>
                    <td>2</td>
                    <td>1</td>
                    <td>0</td>
                    <td>+11</td>
                    <td class="pt-val">24</td>
                </tr>
                <tr class="pos-quarti team-darkknights">
                    <td class="pos-num">3</td>
                    <td class="team-name">
                        <img src="dark-knights.png" alt="">
                        <span>DKT</span>
                    </td>
                    <td>6</td>
                    <td>3</td>
                    <td>1</td>
                    <td>0</td>
                    <td>+6</td>
                    <td class="pt-val">22</td>
                </tr>
                <tr class="pos-quarti team-polar">
                    <td class="pos-num">4</td>
                    <td class="team-name">
                        <img src="polar.png" alt="">
                        <span>POL</span>
                    </td>
                    <td>5</td>
                    <td>4</td>
                    <td>0</td>
                    <td>1</td>
                    <td>+1</td>
                    <td class="pt-val">18</td>
                </tr>
                <tr class="pos-quarti team-birrareal">
                    <td class="pos-num">5</td>
                    <td class="team-name">
                        <img src="birrareal.png" alt="">
                        <span>BIR</span>
                    </td>
                    <td>4</td>
                    <td>5</td>
                    <td>0</td>
                    <td>1</td>
                    <td>-2</td>
                    <td class="pt-val">15</td>
                </tr>
                <tr class="pos-quarti team-kinglions">
                    <td class="pos-num">6</td>
                    <td class="team-name">
                        <img src="king-lions.png" alt="">
                        <span>KLI</span>
                    </td>
                    <td>3</td>
                    <td>6</td>
                    <td>1</td>
                    <td>0</td>
                    <td>-8</td>
                    <td class="pt-val">12</td>
                </tr>
            </tbody>
        </table>

        <div class="kl-legenda">
            <span><span class="box-color semi"></span> Semifinali</span>
            <span><span class="box-color quarti"></span> Quarti di Finale</span>
        </div>
    </div>

    <script>
        const hamburger = document.getElementById('hamburger-menu');
        const navMenu = document.getElementById('nav-links');

        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('active');
        });
    </script>
</body>
</html>
