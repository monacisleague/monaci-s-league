<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' href='style.css'>
    <title>Classifica - Monaci's League</title>
    <style>
        /* STILI SPECIFICI PER LA TABELLA CLASSIFICA */
        .rank-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 15px;
        }
        .rank-title {
            color: var(--gold);
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .rank-table-wrapper {
            background: #141414;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            overflow-x: auto; /* Permette lo sfoltimento sicuro su schermi minuscoli */
        }
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            font-family: sans-serif;
        }
        .rank-table th {
            background-color: #0d0d0d;
            color: var(--gold);
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.9rem;
            padding: 14px 10px;
            border-bottom: 2px solid #222;
        }
        .rank-table td {
            padding: 14px 10px;
            border-bottom: 1px solid #1f1f1f;
            color: #fff;
            font-weight: 700;
            font-size: 1.02rem;
            vertical-align: middle;
        }
        .rank-table tr:last-child td {
            border-bottom: none;
        }
        .rank-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }
        
        /* Allineamento specifico squadra */
        .td-team {
            text-align: left !important;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .td-team img {
            height: 30px;
            width: 30px;
            object-fit: contain;
        }
        .td-pos {
            font-weight: 900 !important;
            color: var(--gold) !important;
            width: 40px;
        }
        .td-pts {
            font-weight: 900 !important;
            color: #00e676 !important; /* Punti in verde brillante */
            font-size: 1.1rem !important;
        }

        /* REGOLE DI SICUREZZA PER SMARTPHONE */
        @media screen and (max-width: 768px) {
            .rank-container {
                margin: 20px auto;
                padding: 0 8px;
            }
            .rank-title {
                font-size: 1.2rem;
                margin-bottom: 15px;
            }
            .rank-table-wrapper {
                padding: 5px;
            }
            .rank-table th, .rank-table td {
                padding: 10px 6px; /* Riduce l'altezza ma mantiene lo spazio laterale */
                font-size: 0.8rem;
            }
            .td-team {
                gap: 6px;
            }
            .td-team img {
                height: 22px;
                width: 22px;
            }
            .td-team span {
                font-size: 0.78rem;
                white-space: nowrap;
            }
            .td-pos {
                width: 25px;
            }
            /* Diamo una larghezza minima fissa alle colonne dati per non farle appiccicare */
            .col-data {
                min-width: 28px; 
            }
            .td-pts {
                font-size: 0.9rem !important;
                min-width: 32px;
            }
        }
    </style>
</head>
<body>
